<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Resume Helper Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div class="container mt-5">
    <h2 class="mb-4">Resume Helper Chatbot</h2>

    <div class="card">
        <div id="chat-history" class="card-body" style="height: 400px; overflow-y: auto;">
            <div class="alert alert-secondary">
                Hi! How can I help you today?
            </div>
        </div>

        <div class="card-footer">
            <div class="mb-2">
                <input id="pdf-file" type="file" class="form-control" accept="application/pdf">
            </div>

            <div class="input-group">
                <input id="user-input" type="text" class="form-control" placeholder="Type a message...">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>
</div>
<script>
    const BACKEND_URL = "{{ backend_url }}";
    const chatHistory = document.getElementById("chat-history");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    function addMessage(message, type) {
        const messageDiv = document.createElement("div");

        if (type === "user") {
            messageDiv.className = "alert alert-primary text-end";
        } else {
            messageDiv.className = "alert alert-secondary";
        }

        messageDiv.textContent = message;
        chatHistory.appendChild(messageDiv);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    sendBtn.addEventListener("click", async function () {
        const message = userInput.value.trim();

        if (message === "") {
            return;
        }

        addMessage(message, "user");
        userInput.value = "";

        try {
            const response = await fetch(`${BACKEND_URL}/chat`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    model: "llama3.1:latest",
                    pdf_text: ""
                })
            });

            const data = await response.json();
            addMessage(data.response, "bot");

        } catch (error) {
            addMessage("Backend connection failed.", "bot");
            console.error(error);
        }
    });

    userInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            sendBtn.click();
        }
    });
</script>
</body>
</html>
